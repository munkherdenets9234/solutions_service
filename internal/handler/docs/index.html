<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DigitalService API Docs</title>
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
<style>
  :root { color-scheme: light dark; }
  body { margin: 0; background: #fafafa; }
  .topbar { display: none !important; }
  @media (prefers-color-scheme: dark) {
    body { background: #1b1b1f; }
    .swagger-ui, .swagger-ui .info .title, .swagger-ui .opblock-tag, .swagger-ui table thead tr td, .swagger-ui table thead tr th,
    .swagger-ui .opblock .opblock-summary-operation-id, .swagger-ui .opblock .opblock-summary-path, .swagger-ui .opblock .opblock-summary-path__deprecated,
    .swagger-ui .opblock .opblock-summary-description, .swagger-ui .scheme-container, .swagger-ui .model-title, .swagger-ui .model,
    .swagger-ui .response-col_status, .swagger-ui .response-col_description, .swagger-ui .parameter__name, .swagger-ui .parameter__type,
    .swagger-ui .tab li, .swagger-ui label, .swagger-ui .opblock-description-wrapper p {
      color: #e8e8ea;
    }
    .swagger-ui, .swagger-ui .scheme-container { background: #1b1b1f; }
    .swagger-ui .opblock-tag { border-bottom-color: #333; }
    .swagger-ui .opblock { background: #232327; border-color: #333; }
    .swagger-ui .opblock .opblock-section-header { background: #232327; }
    .swagger-ui section.models { background: #232327; border-color: #333; }
    .swagger-ui section.models.is-open h4 { border-bottom-color: #333; }
    .swagger-ui .model-box { background: #1b1b1f; }
    .swagger-ui input[type=text], .swagger-ui input[type=password], .swagger-ui textarea, .swagger-ui select {
      background: #16171a; color: #e8e8ea; border-color: #3a3a40;
    }
  }
</style>
</head>
<body>
<div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
  window.onload = () => {
    window.ui = SwaggerUIBundle({
      url: "/docs/openapi.json",
      dom_id: "#swagger-ui",
      deepLinking: true,
      filter: true,
      persistAuthorization: true,
      tagsSorter: "alpha",
      operationsSorter: "alpha",
      presets: [SwaggerUIBundle.presets.apis],
      layout: "BaseLayout"
    });
  };
</script>
</body>
</html>
